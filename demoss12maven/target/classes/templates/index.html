<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ Student</title>
</head>
<body>
<h1>Thông tin sinh viên</h1>
<div th:if="${student != null}">
    <p>ID: <span th:text="${student.id}"></span></p>
    <p>Tên: <span th:text="${student.name}"></span></p>
    <p>Tuổi: <span th:text="${student.age}"></span></p>
</div>
</body>
</html>
